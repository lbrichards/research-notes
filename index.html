<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PDF Assets</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f8fafc;
        --fg: #172033;
        --muted: #5d6b82;
        --line: #d8dee8;
        --link: #0f6f8f;
        --panel: #ffffff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #10141b;
          --fg: #eef3f7;
          --muted: #a6b1c2;
          --line: #2b3442;
          --link: #7dd3fc;
          --panel: #171d26;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font: 16px/1.55 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 28px;
        color: var(--muted);
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        border: 1px solid var(--line);
        background: var(--panel);
      }

      li + li {
        border-top: 1px solid var(--line);
      }

      a {
        display: block;
        padding: 18px 20px;
        color: var(--link);
        font-weight: 650;
        text-decoration: none;
      }

      a:hover,
      a:focus-visible {
        text-decoration: underline;
      }

      small {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PDF Assets</h1>
      <p>Public PDF files served directly through GitHub Pages.</p>
      <ul>
        <li>
          <a href="assets/pdfs/activation-interventions.pdf">
            When Activation Interventions Do and Do Not Carry Facts
            <small>activation-interventions.pdf</small>
          </a>
        </li>
        <li>
          <a href="assets/pdfs/qwen-codec4.pdf">
            A Tiny Interpretable Codec for Analogy Structure in Qwen Hidden States
            <small>qwen-codec4.pdf</small>
          </a>
        </li>
      </ul>
    </main>
  </body>
</html>
